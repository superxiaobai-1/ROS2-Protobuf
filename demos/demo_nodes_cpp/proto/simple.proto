syntax = "proto3";

package demo_nodes_cpp.proto;

message SimpleString
{
  string data = 1;
}

message BigBytes
{
  int64 publish_time_ns = 1;
  bytes data = 2;
}

message Nested
{
  message Vec3
  {
    double x = 1;
    double y = 2;
    double z = 3;
  }

  message Pose
  {
    Vec3 position = 1;
    Vec3 orientation_rpy = 2;
  }

  message Twist
  {
    Vec3 linear = 1;
    Vec3 angular = 2;
  }

  int64 publish_time_ns = 1;
  Pose pose = 2;
  Twist twist = 3;
  repeated Pose history = 4;
  repeated Twist history_twist = 5;
  bytes blob = 6;
}

